<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arrows - Premium Escape Puzzle</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #0f172a;
            padding: 16px;
        }
        
        #header-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 360px;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        #lives-container {
            display: flex;
            gap: 4px;
            font-size: 20px;
            background: #ffffff;
            padding: 6px 14px;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid #e2e8f0;
        }

        .controls-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #level-indicator {
            color: #1e293b;
            font-size: 15px;
            font-weight: 700;
            background: #ffffff;
            padding: 8px 20px;
            border-radius: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid #e2e8f0;
        }

        .icon-btn {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            transition: transform 0.1s ease, background-color 0.2s;
        }
        .icon-btn:active {
            transform: scale(0.92);
            background-color: #f1f5f9;
        }
        .icon-btn svg {
            width: 18px;
            height: 18px;
            fill: #475569;
        }

        /* Premium Compact Rounded Game Board Container */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 360px;
            aspect-ratio: 1 / 1.35;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.06);
            overflow: hidden;
            border: 4px solid #0f172a;
            touch-action: none;
        }

        /* Subtle modern dot-grid background */
        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#cbd5e1 2px, transparent 2px);
            background-size: 24px 24px;
            background-position: 8px 8px;
            pointer-events: none;
        }
        
        /* Premium Minimalist Arrow Designing */
        .arrow-group {
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s;
        }
        .arrow-line {
            fill: none;
            stroke: #0f172a;
            stroke-width: 5; /* Shorter, elegant and thinner strokes */
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none; 
        }
        .arrow-hitbox {
            fill: none;
            stroke: transparent;
            stroke-width: 36; 
            stroke-linecap: round;
            stroke-linejoin: round;
            cursor: pointer;
        }

        /* Smooth Red Pulsating Error Effect */
        .arrow-error .arrow-line {
            stroke: #ef4444 !important;
        }

        .overlay-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            display: none;
            z-index: 10;
        }
        .action-btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 36px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
            transition: background-color 0.2s;
        }
        .action-btn:active {
            background-color: #4338ca;
        }
    </style>
</head>
<body>

    <div id="header-status">
        <div id="lives-container">❤️❤️❤️</div>
        <div class="controls-row">
            <div class="icon-btn" id="hint-btn" title="Hint">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2.5 14h-5v-1h5v1zm0-2h-5v-1h5v1z M9 20h6v1H9z"/>
                </svg>
            </div>
            <div class="icon-btn" id="refresh-btn" title="Restart">
                <svg viewBox="0 0 24 24">
                    <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div class="grid-bg"></div>
        
        <div id="level-indicator" style="position: absolute; top: 16px; left: 16px; z-index: 5; font-size: 13px; padding: 4px 12px; border-radius: 12px;">Level 1</div>

        <svg id="game-svg" viewBox="0 0 360 486" width="100%" height="100%" style="position: absolute; top:0; left:0;">
            <defs>
                <marker id="arrowhead" markerWidth="6" markerHeight="5" refX="3.5" refY="2.5" orient="auto">
                    <polygon points="0 0, 6 2.5, 0 5" fill="#0f172a"/>
                </marker>
            </defs>
            <g id="arrows-container"></g>
        </svg>

        <div id="win-screen" class="overlay-screen">
            <h2 style="margin-bottom: 16px; color: #10b981; font-size: 22px; font-weight: 700;">Level Cleared! 🎉</h2>
            <button class="action-btn" onclick="nextLevel()">Next Level</button>
        </div>

        <div id="gameover-screen" class="overlay-screen">
            <h2 style="margin-bottom: 16px; color: #ef4444; font-size: 22px; font-weight: 700;">Game Over! 😢</h2>
            <button class="action-btn" onclick="resetCurrentLevel()">Try Again</button>
        </div>
    </div>

    <script>
        const svg = document.getElementById('game-svg');
        const container = document.getElementById('arrows-container');
        const winScreen = document.getElementById('win-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const levelIndicator = document.getElementById('level-indicator');
        const livesContainer = document.getElementById('lives-container');

        let currentLevel = 0;
        let remainingLives = 3;

        // Premium Compact Handcrafted Maze Levels (Perfectly scaled down)
        const HANDCRAFTED_LEVELS = [
            [
                { id: 1, dir: "R", path: "M 50 150 L 220 150 L 220 250 L 310 250" },
                { id: 2, dir: "U", path: "M 140 380 L 140 200 L 60 200" },
                { id: 3, dir: "D", path: "M 270 90 L 270 350 L 180 350" }
            ],
            [
                { id: 1, dir: "L", path: "M 310 120 L 110 120 L 110 280 L 50 280" },
                { id: 2, dir: "D", path: "M 180 80 L 180 230 L 280 230 L 280 400" },
                { id: 3, dir: "U", path: "M 230 420 L 230 300 L 130 300" },
                { id: 4, dir: "R", path: "M 60 360 L 310 360" }
            ],
            [
                { id: 1, dir: "D", path: "M 70 90 L 70 400 L 200 400" },
                { id: 2, dir: "R", path: "M 50 180 L 260 180 L 260 290 L 310 290" },
                { id: 3, dir: "U", path: "M 160 340 L 160 140 L 300 140" }
            ]
        ];

        function generateProceduralLevel(levelNum) {
            const levelArrows = [];
            const count = Math.min(4 + Math.floor(levelNum / 3), 9);
            const directions = ["R", "L", "U", "D"];
            
            for(let i=0; i<count; i++) {
                let x1 = 50 + Math.floor(Math.random()*5)*55;
                let y1 = 100 + Math.floor(Math.random()*6)*55;
                let x2 = 50 + Math.floor(Math.random()*5)*55;
                let y2 = 100 + Math.floor(Math.random()*6)*55;
                
                const dir = directions[Math.floor(Math.random()*directions.length)];
                levelArrows.push({
                    id: i,
                    dir: dir,
                    path: `M ${x1} ${y1} L ${x2} ${y2}`
                });
            }
            return levelArrows;
        }

        function updateLivesDisplay() {
            let hearts = "";
            for (let i = 0; i < remainingLives; i++) hearts += "❤️";
            livesContainer.innerText = hearts || "💀 OVER";
        }

        function loadLevel(index) {
            container.innerHTML = "";
            winScreen.style.display = 'none';
            gameoverScreen.style.display = 'none';
            levelIndicator.innerText = `Level ${index + 1}`;
            remainingLives = 3;
            updateLivesDisplay();

            const data = index < HANDCRAFTED_LEVELS.length ? HANDCRAFTED_LEVELS[index] : generateProceduralLevel(index);

            data.forEach(arrow => {
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.setAttribute("class", "arrow-group");
                g.setAttribute("data-dir", arrow.dir);

                const hitbox = document.createElementNS("http://www.w3.org/2000/svg", "path");
                hitbox.setAttribute("class", "arrow-hitbox");
                hitbox.setAttribute("d", arrow.path);

                const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
                line.setAttribute("class", "arrow-line");
                line.setAttribute("d", arrow.path);
                line.setAttribute("marker-end", "url(#arrowhead)");

                g.appendChild(hitbox);
                g.appendChild(line);
                container.appendChild(g);
            });
        }

        // Advanced Glitch-free precise line-crossing logic
        function checkPathIntersection(movingPath, stablePath) {
            const len1 = movingPath.getTotalLength();
            const len2 = stablePath.getTotalLength();
            
            // Checking steps carefully to prevent sticking glitches
            const step = Math.max(2, Math.min(len1 / 50, 6)); 
            for(let i=0; i<=len1; i+=step) {
                let p1 = movingPath.getPointAtLength(i);
                for(let j=0; j<=len2; j+=step) {
                    let p2 = stablePath.getPointAtLength(j);
                    if(Math.abs(p1.x - p2.x) < 12 && Math.abs(p1.y - p2.y) < 12) {
                        return true;
                    }
                }
            }
            return false;
        }

        function handleArrowTap(group) {
            if (remainingLives <= 0) return;

            const targetLine = group.querySelector('.arrow-line');
            const otherGroups = Array.from(document.querySelectorAll('.arrow-group')).filter(g => g !== group);
            
            let isBlocked = false;
            for (let other of otherGroups) {
                if (checkPathIntersection(targetLine, other.querySelector('.arrow-line'))) {
                    isBlocked = true;
                    break;
                }
            }

            if (!isBlocked) {
                group.style.pointerEvents = 'none'; 
                const dir = group.getAttribute('data-dir');
                let tx = 0, ty = 0;
                if(dir === "R") tx = 550;
                if(dir === "L") tx = -550;
                if(dir === "U") ty = -600;
                if(dir === "D") ty = 600;

                group.style.transform = `translate(${tx}px, ${ty}px)`;
                group.style.opacity = '0';
                
                setTimeout(() => {
                    group.remove();
                    if (document.querySelectorAll('.arrow-group').length === 0) {
                        winScreen.style.display = 'flex';
                    }
                }, 350);
            } else {
                if (navigator.vibrate) navigator.vibrate(60);

                group.classList.add('arrow-error');
                group.style.transform = 'translate(4px, 0px)';
                setTimeout(() => group.style.transform = 'translate(-4px, 0px)', 50);
                setTimeout(() => group.style.transform = 'translate(0px, 0px)', 100);
                setTimeout(() => group.classList.remove('arrow-error'), 400);

                remainingLives--;
                updateLivesDisplay();
                if (remainingLives <= 0) {
                    setTimeout(() => { gameoverScreen.style.display = 'flex'; }, 300);
                }
            }
        }

        function triggerHint() {
            const groups = Array.from(document.querySelectorAll('.arrow-group'));
            for (let g of groups) {
                let line = g.querySelector('.arrow-line');
                let blocked = false;
                let others = groups.filter(o => o !== g);
                for(let o of others) {
                    if(checkPathIntersection(line, o.querySelector('.arrow-line'))) { blocked = true; break; }
                }
                if(!blocked) {
                    g.style.opacity = '0.3';
                    setTimeout(() => g.style.opacity = '1', 600);
                    break;
                }
            }
        }

        function resetCurrentLevel() { loadLevel(currentLevel); }
        function nextLevel() { currentLevel++; loadLevel(currentLevel); }

        svg.addEventListener('click', (e) => {
            const g = e.target.closest('.arrow-group');
            if(g) handleArrowTap(g);
        });
        svg.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const g = e.target.closest('.arrow-group');
            if(g) handleArrowTap(g);
        }, { passive: false });

        document.getElementById('refresh-btn').addEventListener('click', resetCurrentLevel);
        document.getElementById('hint-btn').addEventListener('click', triggerHint);

        loadLevel(currentLevel);
    </script>
</body>
</html>
