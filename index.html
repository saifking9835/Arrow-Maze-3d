<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrows - Puzzle Escape</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 20px;
            font-size: 14px;
        }
        /* Game Board Container */
        #game-container {
            position: relative;
            width: 360px;
            height: 480px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 4px solid #34495e;
        }
        /* Grid background dots mimicking your screenshot */
        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#dfe6e9 2px, transparent 2px);
            background-size: 20px 20px;
            pointer-events: none;
        }
        /* Custom styled SVG Arrow paths */
        .arrow-path {
            position: absolute;
            fill: none;
            stroke: #1e272e;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            cursor: pointer;
            transition: transform 0.5s ease-in, opacity 0.5s;
        }
        .arrow-path:hover {
            stroke: #3498db;
        }
        /* Win Screen Overlay */
        #win-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            display: none;
            z-index: 10;
        }
        button {
            background-color: #5c67f2;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(92, 103, 242, 0.3);
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>Arrows</h1>
    <div class="subtitle">Level 1 - Clear all paths!</div>

    <div id="game-container">
        <div class="grid-bg"></div>
        
        <svg id="game-svg" width="360" height="480" style="position: absolute; top:0; left:0;">
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#1e272e"/>
                </marker>
                <marker id="arrowhead-hover" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
                </marker>
            </defs>

            <path id="arrow1" class="arrow-path" d="M 40 80 L 320 80" marker-end="url(#arrowhead)" data-dir="R" />
            
            <path id="arrow2" class="arrow-path" d="M 100 240 L 100 120" marker-end="url(#arrowhead)" data-dir="U" />
            
            <path id="arrow3" class="arrow-path" d="M 180 160 L 260 160 L 260 280" marker-end="url(#arrowhead)" data-dir="D" />
            
            <path id="arrow4" class="arrow-path" d="M 300 360 L 60 360" marker-end="url(#arrowhead)" data-dir="L" />
        </svg>

        <div id="win-screen">
            <h2 style="margin-bottom: 15px; color: #2ecc71;">Level Cleared! 🎉</h2>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <script>
        const svg = document.getElementById('game-svg');
        const winScreen = document.getElementById('win-screen');
        
        // Bounding box dimensions for the board
        const BOARD_WIDTH = 360;
        const BOARD_HEIGHT = 480;

        // Custom function to check if two SVG paths intersect
        function isColliding(path1, path2) {
            // Get accurate coordinates along the paths to check for blockages
            const len1 = path1.getTotalLength();
            const len2 = path2.getTotalLength();
            
            // Sample points along both lines
            for (let i = 0; i <= len1; i += 8) {
                const pt1 = path1.getPointAtLength(i);
                for (let j = 0; j <= len2; j += 8) {
                    const pt2 = path2.getPointAtLength(j);
                    // If points are extremely close, they are overlapping/blocking
                    if (Math.abs(pt1.x - pt2.x) < 6 && Math.abs(pt1.y - pt2.y) < 6) {
                        return true;
                    }
                }
            }
            return false;
        }

        // Handles the click on any arrow
        svg.addEventListener('click', (e) => {
            const clickedPath = e.target.closest('.arrow-path');
            if (!clickedPath) return;

            const direction = clickedPath.getAttribute('data-dir');
            
            // Create a "ghost/virtual" prediction line to see if it can exit safely
            const ghostPath = clickedPath.cloneNode(true);
            svg.appendChild(ghostPath);

            // Extend the ghost path all the way out of the screen based on its direction
            let translationX = 0;
            let translationY = 0;
            if (direction === 'R') translationX = BOARD_WIDTH;
            if (direction === 'L') translationX = -BOARD_WIDTH;
            if (direction === 'U') translationY = -BOARD_HEIGHT;
            if (direction === 'D') translationY = BOARD_HEIGHT;

            ghostPath.setAttribute('transform', `translate(${translationX}, ${translationY})`);

            // Check if this exit path collides with any REMAINING active arrows
            const otherArrows = Array.from(document.querySelectorAll('.arrow-path')).filter(p => p !== clickedPath);
            let isBlocked = false;

            for (let other of otherArrows) {
                if (isColliding(ghostPath, other)) {
                    isBlocked = true;
                    break;
                }
            }

            // Remove the temporary check line
            ghostPath.remove();

            if (!isBlocked) {
                // SUCCESS: Fly out of the screen!
                clickedPath.style.transform = `translate(${translationX}px, ${translationY}px)`;
                clickedPath.style.opacity = '0';
                
                // Remove from DOM after animation completes
                setTimeout(() => {
                    clickedPath.remove();
                    checkWin();
                }, 500);
            } else {
                // BLOCKED: Small shake effect to show it's stuck
                clickedPath.style.transform = 'translate(5px, 0px)';
                setTimeout(() => clickedPath.style.transform = 'translate(-5px, 0px)', 100);
                setTimeout(() => clickedPath.style.transform = 'translate(0px, 0px)', 200);
            }
        });

        function checkWin() {
            const remaining = document.querySelectorAll('.arrow-path');
            if (remaining.length === 0) {
                winScreen.style.display = 'flex';
            }
        }

        function resetGame() {
            location.reload(); // Quick reset by reloading the single page
        }
    </script>
</body>
</html>
