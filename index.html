<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arrows - Puzzle Escape</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
            overflow: hidden;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        /* Hearts/Life Display */
        #lives-container {
            display: flex;
            gap: 5px;
            font-size: 22px;
            margin-bottom: 10px;
            height: 30px;
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 360px;
            padding: 0 15px;
            margin-bottom: 15px;
        }
        #level-indicator {
            color: #2c3e50;
            font-size: 18px;
            font-weight: bold;
        }
        .icon-btn {
            background: white;
            border: 2px solid #dfe6e9;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            touch-action: manipulation;
        }
        .icon-btn:active {
            transform: scale(0.9);
            background-color: #f1f2f6;
        }

        #game-container {
            position: relative;
            width: 360px;
            height: 480px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 4px solid #34495e;
            touch-action: none;
        }
        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#dfe6e9 2px, transparent 2px);
            background-size: 20px 20px;
            pointer-events: none;
        }
        .arrow-group {
            cursor: pointer;
            transition: transform 0.4s ease-out, opacity 0.4s;
        }
        .arrow-line {
            fill: none;
            stroke: #1e272e;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none; 
        }
        .arrow-hitbox {
            fill: none;
            stroke: transparent;
            stroke-width: 40; 
            stroke-linecap: round;
            stroke-linejoin: round;
            cursor: pointer;
        }
        
        @keyframes hint-glow {
            0% { stroke: #1e272e; stroke-width: 6; }
            50% { stroke: #2ecc71; stroke-width: 12; }
            100% { stroke: #1e272e; stroke-width: 6; }
        }
        .hint-active .arrow-line {
            animation: hint-glow 0.5s ease-in-out 3;
        }

        /* Modals/Overlays */
        .overlay-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            display: none;
            z-index: 10;
        }
        .action-btn {
            background-color: #5c67f2;
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(92, 103, 242, 0.4);
        }
    </style>
</head>
<body>

    <h1>Arrows</h1>
    
    <div id="lives-container">❤️❤️❤️</div>
    
    <div class="controls-row">
        <div class="icon-btn" id="hint-btn">💡</div>
        <div id="level-indicator">Level 1</div>
        <div class="icon-btn" id="refresh-btn">🔄</div>
    </div>

    <div id="game-container">
        <div class="grid-bg"></div>
        
        <svg id="game-svg" width="360" height="480" style="position: absolute; top:0; left:0;">
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#1e272e"/>
                </marker>
            </defs>
            <g id="arrows-container"></g>
        </svg>

        <div id="win-screen" class="overlay-screen">
            <h2 id="win-title" style="margin-bottom: 20px; color: #2ecc71;">Level Cleared! 🎉</h2>
            <button class="action-btn" id="action-btn" onclick="nextLevel()">Next Level</button>
        </div>

        <div id="gameover-screen" class="overlay-screen">
            <h2 style="margin-bottom: 20px; color: #e74c3c;">Game Over! 😢</h2>
            <button class="action-btn" onclick="resetCurrentLevel()">Try Again</button>
        </div>
    </div>

    <script>
        const svg = document.getElementById('game-svg');
        const container = document.getElementById('arrows-container');
        const winScreen = document.getElementById('win-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const levelIndicator = document.getElementById('level-indicator');
        const livesContainer = document.getElementById('lives-container');
        const actionBtn = document.getElementById('action-btn');
        const winTitle = document.getElementById('win-title');

        const BOARD_WIDTH = 360;
        const BOARD_HEIGHT = 480;
        
        let currentLevel = 0;
        let maxLives = 3;
        let remainingLives = maxLives;

        // Perfectly layered configuration so levels don't jam up at start
        const ALL_LEVELS = [
            // Level 1
            [
                { id: "a1", dir: "R", path: "M 40 80 L 320 80" },
                { id: "a2", dir: "U", path: "M 100 290 L 100 150" },
                { id: "a3", dir: "D", path: "M 180 180 L 260 180 L 260 300" },
                { id: "a4", dir: "L", path: "M 300 390 L 60 390" }
            ],
            // Level 2 (Matching original geometry perfectly)
            [
                { id: "b1", dir: "U", path: "M 75 410 L 75 145" },
                { id: "b2", dir: "R", path: "M 55 265 L 315 265" },
                { id: "b3", dir: "L", path: "M 315 175 L 125 175" },
                { id: "b4", dir: "D", path: "M 225 75 L 225 355" },
                { id: "b5", dir: "R", path: "M 105 345 L 295 345" }
            ],
            // Level 3
            [
                { id: "c1", dir: "R", path: "M 40 100 L 320 100" },
                { id: "c2", dir: "D", path: "M 80 60 L 80 220 L 200 220" },
                { id: "c3", dir: "L", path: "M 290 150 L 140 150" },
                { id: "c4", dir: "U", path: "M 160 420 L 160 290" },
                { id: "c5", dir: "D", path: "M 270 130 L 270 400" },
                { id: "c6", dir: "L", path: "M 320 370 L 60 370" }
            ]
        ];

        function updateLivesDisplay() {
            let hearts = "";
            for (let i = 0; i < remainingLives; i++) {
                hearts += "❤️";
            }
            if (hearts === "") hearts = "💀 Game Over";
            livesContainer.innerText = hearts;
        }

        function loadLevel(levelIndex) {
            container.innerHTML = "";
            winScreen.style.display = 'none';
            gameoverScreen.style.display = 'none';
            levelIndicator.innerText = `Level ${levelIndex + 1}`;
            remainingLives = maxLives;
            updateLivesDisplay();

            const levelData = ALL_LEVELS[levelIndex];
            levelData.forEach(arrow => {
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.setAttribute("class", "arrow-group");
                g.setAttribute("data-dir", arrow.dir);

                const hitbox = document.createElementNS("http://www.w3.org/2000/svg", "path");
                hitbox.setAttribute("class", "arrow-hitbox");
                hitbox.setAttribute("d", arrow.path);

                const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
                line.setAttribute("class", "arrow-line");
                line.setAttribute("d", arrow.path);
                line.setAttribute("marker-end", "url(#arrowhead)");

                g.appendChild(hitbox);
                g.appendChild(line);
                container.appendChild(g);
            });
        }

        // True Raycast Algorithm: Only blocks if TIP points directly onto another active line
        function testEscapePath(group) {
            if (remainingLives <= 0) return { isBlocked: true };

            const direction = group.getAttribute('data-dir');
            const mainLine = group.querySelector('.arrow-line');
            const totalLen = mainLine.getTotalLength();
            const tipPoint = mainLine.getPointAtLength(totalLen); // Exact coordinates of Arrow Head Tip

            const otherGroups = Array.from(document.querySelectorAll('.arrow-group')).filter(g => g !== group);
            let isBlocked = false;

            // Check if arrow tip hits ANY active line during forward movement
            for (let other of otherGroups) {
                const otherLine = other.querySelector('.arrow-line');
                const otherLen = otherLine.getTotalLength();

                for (let j = 0; j <= otherLen; j += 4) {
                    const pt = otherLine.getPointAtLength(j);
                    
                    if (direction === 'R' && pt.y > tipPoint.y - 8 && pt.y < tipPoint.y + 8 && pt.x > tipPoint.x) isBlocked = true;
                    if (direction === 'L' && pt.y > tipPoint.y - 8 && pt.y < tipPoint.y + 8 && pt.x < tipPoint.x) isBlocked = true;
                    if (direction === 'U' && pt.x > tipPoint.x - 8 && pt.x < tipPoint.x + 8 && pt.y < tipPoint.y) isBlocked = true;
                    if (direction === 'D' && pt.x > tipPoint.x - 8 && pt.x < tipPoint.x + 8 && pt.y > tipPoint.y) isBlocked = true;

                    if (isBlocked) break;
                }
                if (isBlocked) break;
            }

            let tx = 0, ty = 0;
            if (direction === 'R') tx = BOARD_WIDTH;
            if (direction === 'L') tx = -BOARD_WIDTH;
            if (direction === 'U') ty = -BOARD_HEIGHT;
            if (direction === 'D') ty = BOARD_HEIGHT;

            return { isBlocked, tx, ty };
        }

        function handleArrowClick(clickedGroup) {
            if (!clickedGroup || remainingLives <= 0) return;

            const assessment = testEscapePath(clickedGroup);

            if (!assessment.isBlocked) {
                clickedGroup.style.transform = `translate(${assessment.tx}px, ${assessment.ty}px)`;
                clickedGroup.style.opacity = '0';
                clickedGroup.style.pointerEvents = 'none';
                setTimeout(() => {
                    clickedGroup.remove();
                    checkWin();
                }, 400);
            } else {
                // Shake FeedBack
                clickedGroup.style.transform = 'translate(8px, 0px)';
                setTimeout(() => clickedGroup.style.transform = 'translate(-8px, 0px)', 60);
                setTimeout(() => clickedGroup.style.transform = 'translate(0px, 0px)', 120);

                // Lose a Life
                remainingLives--;
                updateLivesDisplay();
                if (remainingLives <= 0) {
                    setTimeout(() => { gameoverScreen.style.display = 'flex'; }, 300);
                }
            }
        }

        function showHint() {
            const groups = Array.from(document.querySelectorAll('.arrow-group'));
            for (let group of groups) {
                const check = testEscapePath(group);
                if (!check.isBlocked) {
                    group.classList.add('hint-active');
                    setTimeout(() => group.classList.remove('hint-active'), 1500);
                    return; 
                }
            }
        }

        function resetCurrentLevel() {
            loadLevel(currentLevel);
        }

        // High responsiveness mobile touch listeners
        svg.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const group = e.target.closest('.arrow-group');
            if (group) handleArrowClick(group);
        }, { passive: false });

        svg.addEventListener('click', (e) => {
            const group = e.target.closest('.arrow-group');
            if (group) handleArrowClick(group);
        });

        document.getElementById('hint-btn').addEventListener('touchstart', (e) => { e.preventDefault(); showHint(); });
        document.getElementById('hint-btn').addEventListener('click', showHint);

        document.getElementById('refresh-btn').addEventListener('touchstart', (e) => { e.preventDefault(); resetCurrentLevel(); });
        document.getElementById('refresh-btn').addEventListener('click', resetCurrentLevel);

        function checkWin() {
            if (document.querySelectorAll('.arrow-group').length === 0) {
                if (currentLevel < ALL_LEVELS.length - 1) {
                    winTitle.innerText = "Level Cleared! 🎉";
                    actionBtn.innerText = "Next Level";
                } else {
                    winTitle.innerText = "You Won the Game! 🔥🏆";
                    actionBtn.innerText = "Restart Game";
                }
                winScreen.style.display = 'flex';
            }
        }

        function nextLevel() {
            if (currentLevel < ALL_LEVELS.length - 1) {
                currentLevel++;
                loadLevel(currentLevel);
            } else {
                currentLevel = 0;
                loadLevel(currentLevel);
            }
        }

        loadLevel(currentLevel);
    </script>
</body>
</html>
