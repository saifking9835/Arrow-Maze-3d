<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arrows - Puzzle Escape</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
            overflow: hidden;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        /* Top Navigation/Controls Row */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 360px;
            padding: 0 10px;
            margin-bottom: 15px;
        }
        #level-indicator {
            color: #2c3e50;
            font-size: 18px;
            font-weight: bold;
        }
        .icon-btn {
            background: white;
            border: 2px solid #dfe6e9;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.1s, background-color 0.2s;
        }
        .icon-btn:active {
            transform: scale(0.9);
            background-color: #f1f2f6;
        }

        /* Game Board */
        #game-container {
            position: relative;
            width: 360px;
            height: 480px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 4px solid #34495e;
            touch-action: none;
        }
        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#dfe6e9 2px, transparent 2px);
            background-size: 20px 20px;
            pointer-events: none;
        }
        .arrow-group {
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s;
        }
        .arrow-line {
            fill: none;
            stroke: #1e272e;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none; 
        }
        .arrow-hitbox {
            fill: none;
            stroke: transparent;
            stroke-width: 35; 
            stroke-linecap: round;
            stroke-linejoin: round;
            cursor: pointer;
        }
        
        /* Highlight hint animation */
        @keyframes hint-glow {
            0% { stroke: #5c67f2; stroke-width: 10; }
            50% { stroke: #e74c3c; stroke-width: 14; }
            100% { stroke: #5c67f2; stroke-width: 10; }
        }
        .hint-active .arrow-line {
            animation: hint-glow 0.8s ease-in-out 2;
        }

        .arrow-group:active .arrow-line {
            stroke: #5c67f2;
        }
        #win-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            display: none;
            z-index: 10;
        }
        .action-btn {
            background-color: #5c67f2;
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(92, 103, 242, 0.4);
        }
    </style>
</head>
<body>

    <h1>Arrows</h1>
    
    <div class="controls-row">
        <button class="icon-btn" onclick="showHint()" title="Hint/Idea">💡</button>
        <div id="level-indicator">Level 1</div>
        <button class="icon-btn" onclick="resetCurrentLevel()" title="Refresh Level">🔄</button>
    </div>

    <div id="game-container">
        <div class="grid-bg"></div>
        
        <svg id="game-svg" width="360" height="480" style="position: absolute; top:0; left:0;">
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#1e272e"/>
                </marker>
            </defs>
            <g id="arrows-container"></g>
        </svg>

        <div id="win-screen">
            <h2 id="win-title" style="margin-bottom: 20px; color: #2ecc71;">Level Cleared! 🎉</h2>
            <button class="action-btn" id="action-btn" onclick="nextLevel()">Next Level</button>
        </div>
    </div>

    <script>
        const svg = document.getElementById('game-svg');
        const container = document.getElementById('arrows-container');
        const winScreen = document.getElementById('win-screen');
        const levelIndicator = document.getElementById('level-indicator');
        const actionBtn = document.getElementById('action-btn');
        const winTitle = document.getElementById('win-title');

        const BOARD_WIDTH = 360;
        const BOARD_HEIGHT = 480;
        
        let currentLevel = 0;

        // Upgraded Level configurations with safer spacing coordinates
        const ALL_LEVELS = [
            // Level 1
            [
                { id: "a1", dir: "R", path: "M 40 80 L 320 80" },
                { id: "a2", dir: "U", path: "M 100 290 L 100 150" },
                { id: "a3", dir: "D", path: "M 180 180 L 260 180 L 260 300" },
                { id: "a4", dir: "L", path: "M 300 390 L 60 390" }
            ],
            // Level 2 (Fixed & Corrected Layout)
            [
                { id: "b1", dir: "U", path: "M 70 420 L 70 140" },
                { id: "b2", dir: "R", path: "M 50 250 L 310 250" },
                { id: "b3", dir: "L", path: "M 310 180 L 130 180" },
                { id: "b4", dir: "D", path: "M 230 100 L 230 350" },
                { id: "b5", dir: "R", path: "M 110 320 L 290 320" }
            ],
            // Level 3
            [
                { id: "c1", dir: "R", path: "M 40 100 L 320 100" },
                { id: "c2", dir: "D", path: "M 80 60 L 80 220 L 200 220" },
                { id: "c3", dir: "L", path: "M 290 160 L 140 160" },
                { id: "c4", dir: "U", path: "M 160 420 L 160 290" },
                { id: "c5", dir: "D", path: "M 270 140 L 270 400" },
                { id: "c6", dir: "L", path: "M 320 360 L 60 360" }
            ]
        ];

        function loadLevel(levelIndex) {
            container.innerHTML = "";
            winScreen.style.display = 'none';
            levelIndicator.innerText = `Level ${levelIndex + 1}`;

            const levelData = ALL_LEVELS[levelIndex];
            levelData.forEach(arrow => {
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.setAttribute("class", "arrow-group");
                g.setAttribute("data-dir", arrow.dir);

                const hitbox = document.createElementNS("http://www.w3.org/2000/svg", "path");
                hitbox.setAttribute("class", "arrow-hitbox");
                hitbox.setAttribute("d", arrow.path);

                const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
                line.setAttribute("class", "arrow-line");
                line.setAttribute("d", arrow.path);
                line.setAttribute("marker-end", "url(#arrowhead)");

                g.appendChild(hitbox);
                g.appendChild(line);
                container.appendChild(g);
            });
        }

        function isColliding(path1, path2) {
            const len1 = path1.getTotalLength();
            const len2 = path2.getTotalLength();
            // High-precision geometric sweep check
            for (let i = 0; i <= len1; i += 4) {
                const pt1 = path1.getPointAtLength(i);
                for (let j = 0; j <= len2; j += 4) {
                    const pt2 = path2.getPointAtLength(j);
                    if (Math.abs(pt1.x - pt2.x) < 8 && Math.abs(pt1.y - pt2.y) < 8) {
                        return true;
                    }
                }
            }
            return false;
        }

        function checkEscapePossibility(group) {
            const direction = group.getAttribute('data-dir');
            const mainLine = group.querySelector('.arrow-line');
            
            const ghostPath = mainLine.cloneNode(true);
            svg.appendChild(ghostPath);

            let translationX = 0, translationY = 0;
            if (direction === 'R') translationX = BOARD_WIDTH;
            if (direction === 'L') translationX = -BOARD_WIDTH;
            if (direction === 'U') translationY = -BOARD_HEIGHT;
            if (direction === 'D') translationY = BOARD_HEIGHT;

            ghostPath.setAttribute('transform', `translate(${translationX}, ${translationY})`);

            const otherGroups = Array.from(document.querySelectorAll('.arrow-group')).filter(g => g !== group);
            let isBlocked = false;

            for (let other of otherGroups) {
                const otherLine = other.querySelector('.arrow-line');
                if (isColliding(ghostPath, otherLine)) {
                    isBlocked = true;
                    break;
                }
            }

            ghostPath.remove();
            return { isBlocked, translationX, translationY };
        }

        function handleArrowClick(clickedGroup) {
            if (!clickedGroup || !clickedGroup.classList.contains('arrow-group')) return;

            const assessment = checkEscapePossibility(clickedGroup);

            if (!assessment.isBlocked) {
                clickedGroup.style.transform = `translate(${assessment.translationX}px, ${assessment.translationY}px)`;
                clickedGroup.style.opacity = '0';
                clickedGroup.style.pointerEvents = 'none';
                setTimeout(() => {
                    clickedGroup.remove();
                    checkWin();
                }, 400);
            } else {
                // Shake feedback
                clickedGroup.style.transform = 'translate(8px, 0px)';
                setTimeout(() => clickedGroup.style.transform = 'translate(-8px, 0px)', 60);
                setTimeout(() => clickedGroup.style.transform = 'translate(0px, 0px)', 120);
            }
        }

        // Hint System Logic
        function showHint() {
            const groups = Array.from(document.querySelectorAll('.arrow-group'));
            for (let group of groups) {
                const check = checkEscapePossibility(group);
                if (!check.isBlocked) {
                    group.classList.add('hint-active');
                    setTimeout(() => group.classList.remove('hint-active'), 1600);
                    return; 
                }
            }
        }

        function resetCurrentLevel() {
            loadLevel(currentLevel);
        }

        // Touch & Click Listeners
        svg.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const group = e.target.closest('.arrow-group');
            if (group) handleArrowClick(group);
        }, { passive: false });

        svg.addEventListener('click', (e) => {
            const group = e.target.closest('.arrow-group');
            if (group) handleArrowClick(group);
        });

        function checkWin() {
            if (document.querySelectorAll('.arrow-group').length === 0) {
                if (currentLevel < ALL_LEVELS.length - 1) {
                    winTitle.innerText = "Level Cleared! 🎉";
                    actionBtn.innerText = "Next Level";
                } else {
                    winTitle.innerText = "You Won the Game! 🔥🏆";
                    actionBtn.innerText = "Restart Game";
                }
                winScreen.style.display = 'flex';
            }
        }

        function nextLevel() {
            if (currentLevel < ALL_LEVELS.length - 1) {
                currentLevel++;
                loadLevel(currentLevel);
            } else {
                currentLevel = 0;
                loadLevel(currentLevel);
            }
        }

        // Start Game
        loadLevel(currentLevel);
    </script>
</body>
</html>
