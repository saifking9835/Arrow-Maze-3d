<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arrows - Puzzle Escape</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
            overflow: hidden;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #7f8c8d;
            margin-bottom: 20px;
            font-size: 14px;
        }
        #game-container {
            position: relative;
            width: 360px;
            height: 480px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 4px solid #34495e;
            touch-action: none;
        }
        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#dfe6e9 2px, transparent 2px);
            background-size: 20px 20px;
            pointer-events: none;
        }
        /* Touch area ko bada karne ke liye wrapper group */
        .arrow-group {
            cursor: pointer;
            pointer-events: auto;
            transition: transform 0.5s ease-in, opacity 0.5s;
        }
        /* Dikhne wali line */
        .arrow-line {
            fill: none;
            stroke: #1e272e;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none; 
        }
        /* Mobile par touch pakadne ke liye invisible moti line */
        .arrow-hitbox {
            fill: none;
            stroke: transparent;
            stroke-width: 30; 
            stroke-linecap: round;
            stroke-linejoin: round;
            cursor: pointer;
        }
        .arrow-group:active .arrow-line {
            stroke: #3498db;
        }
        #win-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            display: none;
            z-index: 10;
        }
        button {
            background-color: #5c67f2;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(92, 103, 242, 0.3);
        }
    </style>
</head>
<body>

    <h1>Arrows</h1>
    <div class="subtitle">Level 1 - Clear all paths!</div>

    <div id="game-container">
        <div class="grid-bg"></div>
        
        <svg id="game-svg" width="360" height="480" style="position: absolute; top:0; left:0;">
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
                    <polygon points="0 0, 10 3.5, 0 7" fill="#1e272e"/>
                </marker>
            </defs>

            <!-- Arrow 1: Top Right -->
            <g id="arrow1" class="arrow-group" data-dir="R">
                <path class="arrow-hitbox" d="M 40 80 L 320 80" />
                <path class="arrow-line" d="M 40 80 L 320 80" marker-end="url(#arrowhead)" />
            </g>
            
            <!-- Arrow 2: Up -->
            <g id="arrow2" class="arrow-group" data-dir="U">
                <path class="arrow-hitbox" d="M 100 290 L 100 150" />
                <path class="arrow-line" d="M 100 290 L 100 150" marker-end="url(#arrowhead)" />
            </g>
            
            <!-- Arrow 3: Hooked Down -->
            <g id="arrow3" class="arrow-group" data-dir="D">
                <path class="arrow-hitbox" d="M 180 180 L 260 180 L 260 300" />
                <path class="arrow-line" d="M 180 180 L 260 180 L 260 300" marker-end="url(#arrowhead)" />
            </g>
            
            <!-- Arrow 4: Bottom Left -->
            <g id="arrow4" class="arrow-group" data-dir="L">
                <path class="arrow-hitbox" d="M 300 390 L 60 390" />
                <path class="arrow-line" d="M 300 390 L 60 390" marker-end="url(#arrowhead)" />
            </g>
        </svg>

        <div id="win-screen">
            <h2 style="margin-bottom: 15px; color: #2ecc71;">Level Cleared! 🎉</h2>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <script>
        const svg = document.getElementById('game-svg');
        const winScreen = document.getElementById('win-screen');
        const BOARD_WIDTH = 360;
        const BOARD_HEIGHT = 480;

        function isColliding(path1, path2) {
            const len1 = path1.getTotalLength();
            const len2 = path2.getTotalLength();
            for (let i = 0; i <= len1; i += 8) {
                const pt1 = path1.getPointAtLength(i);
                for (let j = 0; j <= len2; j += 8) {
                    const pt2 = path2.getPointAtLength(j);
                    if (Math.abs(pt1.x - pt2.x) < 12 && Math.abs(pt1.y - pt2.y) < 12) {
                        return true;
                    }
                }
            }
            return false;
        }

        function handleArrowClick(clickedGroup) {
            if (!clickedGroup || !clickedGroup.classList.contains('arrow-group')) return;

            const direction = clickedGroup.getAttribute('data-dir');
            const mainLine = clickedGroup.querySelector('.arrow-line');
            
            const ghostPath = mainLine.cloneNode(true);
            svg.appendChild(ghostPath);

            let translationX = 0;
            let translationY = 0;
            if (direction === 'R') translationX = BOARD_WIDTH;
            if (direction === 'L') translationX = -BOARD_WIDTH;
            if (direction === 'U') translationY = -BOARD_HEIGHT;
            if (direction === 'D') translationY = BOARD_HEIGHT;

            ghostPath.setAttribute('transform', `translate(${translationX}, ${translationY})`);

            const otherGroups = Array.from(document.querySelectorAll('.arrow-group')).filter(g => g !== clickedGroup);
            let isBlocked = false;

            for (let other of otherGroups) {
                const otherLine = other.querySelector('.arrow-line');
                if (isColliding(ghostPath, otherLine)) {
                    isBlocked = true;
                    break;
                }
            }

            ghostPath.remove();

            if (!isBlocked) {
                clickedGroup.style.transform = `translate(${translationX}px, ${translationY}px)`;
                clickedGroup.style.opacity = '0';
                setTimeout(() => {
                    clickedGroup.remove();
                    checkWin();
                }, 500);
            } else {
                clickedGroup.style.transform = 'translate(8px, 0px)';
                setTimeout(() => clickedGroup.style.transform = 'translate(-8px, 0px)', 80);
                setTimeout(() => clickedGroup.style.transform = 'translate(0px, 0px)', 160);
            }
        }

        // Mobile touch aur desktop click dono ko support karne ke liye listener
        svg.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const group = e.target.closest('.arrow-group');
            if (group) handleArrowClick(group);
        }, { passive: false });

        svg.addEventListener('click', (e) => {
            const group = e.target.closest('.arrow-group');
            if (group) handleArrowClick(group);
        });

        function checkWin() {
            if (document.querySelectorAll('.arrow-group').length === 0) {
                winScreen.style.display = 'flex';
            }
        }

        function resetGame() {
            location.reload();
        }
    </script>
</body>
</html>
