<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arrows - Pure Premium Escape</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #0f172a;
            overflow: hidden;
        }
        
        #lives-container {
            display: flex;
            gap: 8px;
            font-size: 22px;
            margin-bottom: 16px;
            height: 28px;
        }

        /* Top Header Navigation Panel */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 380px;
            padding: 0 8px;
            margin-bottom: 20px;
        }
        #level-indicator {
            color: #1e293b;
            font-size: 18px;
            font-weight: 700;
            background: #ffffff;
            padding: 6px 20px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #e2e8f0;
        }
        .icon-btn {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            transition: all 0.15s ease;
        }
        .icon-btn:active {
            transform: scale(0.92);
            background-color: #f1f5f9;
        }
        .icon-btn svg {
            width: 22px;
            height: 22px;
            fill: #475569;
        }

        /* Pure Minimalist Game Frame Container */
        #game-container {
            position: relative;
            width: 380px;
            height: 540px;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 4px solid #0f172a;
            touch-action: none;
        }
        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#cbd5e1 2px, transparent 2px);
            background-size: 24px 24px;
            pointer-events: none;
        }
        
        /* Sleek & Thin Miniature Arrows Styling */
        .arrow-group {
            cursor: pointer;
            transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.35s;
        }
        .arrow-line {
            fill: none;
            stroke: #0f172a;
            stroke-width: 4.5; /* Slender minimal line weight matching original app */
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none; 
        }
        .arrow-hitbox {
            fill: none;
            stroke: transparent;
            stroke-width: 32; 
            stroke-linecap: round;
            stroke-linejoin: round;
            cursor: pointer;
        }

        .arrow-error .arrow-line {
            stroke: #ef4444 !important;
        }

        /* Overlay Interface */
        .overlay-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            display: none;
            z-index: 10;
        }
        .action-btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.25);
        }
    </style>
</head>
<body>

    <div id="lives-container">❤️❤️❤️</div>
    
    <div class="controls-row">
        <div class="icon-btn" id="hint-btn" title="Hint/Idea">
            <svg viewBox="0 0 24 24">

            </svg>
        </div>

        <div id="level-indicator">Level 1</div>

        <div class="icon-btn" id="sound-btn" title="Toggle Sound">

                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
            </svg>
            <svg id="sound-icon-off" viewBox="0 0 24 24" style="display: none;">

            </svg>
        </div>

        <div class="icon-btn" id="refresh-btn" title="Reset">
            <svg viewBox="0 0 24 24">
                <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
            </svg>
        </div>
    </div>

    <div id="game-container">
        <div class="grid-bg"></div>
        
        <svg id="game-svg" width="380" height="540" style="position: absolute; top:0; left:0;">
            <defs>
                <marker id="arrowhead" markerWidth="6" markerHeight="5" refX="3" refY="2.5" orient="auto">
                    <polygon points="0 0, 6 2.5, 0 5" fill="#0f172a"/>
                </marker>
            </defs>
            <g id="arrows-container"></g>
        </svg>

        <div id="win-screen" class="overlay-screen">
            <h2 style="margin-bottom: 24px; color: #10b981; font-size: 24px; font-weight: 700;">Level Cleared! 🎉</h2>
            <button class="action-btn" onclick="nextLevel()">Next Level</button>
        </div>

        <div id="gameover-screen" class="overlay-screen">
            <h2 style="margin-bottom: 24px; color: #ef4444; font-size: 24px; font-weight: 700;">Game Over! 😢</h2>
            <button class="action-btn" onclick="resetCurrentLevel()">Try Again</button>
        </div>
    </div>

    <script>

        let isSoundOn = true;

            if (!audioCtx) {

                audioCtx.resume();
            }
