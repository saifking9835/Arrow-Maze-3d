<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arrows - Ultimate Puzzle Escape</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #1f2937;
            padding: 10px;
        }
        
        #lives-container {
            display: flex;
            gap: 6px;
            font-size: 22px;
            margin-bottom: 8px;
            height: 30px;
        }

        /* Responsive Controls Row */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 400px;
            padding: 0 10px;
            margin-bottom: 12px;
        }
        #level-indicator {
            color: #1f2937;
            font-size: 16px;
            font-weight: 700;
            background: #ffffff;
            padding: 6px 20px;
            border-radius: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e5e7eb;
        }
        .icon-btn {
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.1s ease;
        }
        .icon-btn:active {
            transform: scale(0.9);
            background-color: #f9fafb;
        }
        .icon-btn svg {
            width: 22px;
            height: 22px;
            fill: #4b5563;
        }

        /* Auto-scaling Responsive Game Container */
        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 400 / 580;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            overflow: hidden;
            border: 4px solid #1f2937;
            touch-action: none;
        }
        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#d1d5db 2px, transparent 2px);
            background-size: 25px 25px;
            pointer-events: none;
        }
        
        /* Smooth Neon-Sleek Styled Arrows */
        .arrow-group {
            cursor: pointer;
            transition: transform 0.45s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.3s;
        }
        .arrow-line {
            fill: none;
            stroke: #1f2937;
            stroke-width: 5; /* Perfect Thin & Premium look */
            stroke-linecap: round;
            stroke-linejoin: round;
            pointer-events: none; 
        }
        .arrow-hitbox {
            fill: none;
            stroke: transparent;
            stroke-width: 40; 
            stroke-linecap: round;
            stroke-linejoin: round;
            cursor: pointer;
        }

        .arrow-error .arrow-line {
            stroke: #ef4444 !important;
        }

        .overlay-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            display: none;
            z-index: 10;
        }
        .action-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body>

    <div id="lives-container">❤️❤️❤️</div>

        <div class="icon-btn" id="hint-btn">
